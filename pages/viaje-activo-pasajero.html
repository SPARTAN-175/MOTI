<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Tu viaje

</title>

<link
rel="stylesheet"
href="../css/variables.css">

<link
rel="stylesheet"
href="../css/main.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">
  
<link
rel="stylesheet"
href="../css/viaje-activo-pasajero.css">

</head>

<body>

<div class="container">

<h2>

Tu viaje

</h2>

<div class="card">

<p>

<strong>

Estado

</strong>

</p>

<p id="estadoViaje">

Cargando...

</p>

</div>

<div class="card">

<p>

<strong>

Conductor

</strong>

</p>

<p id="nombreConductor">

Esperando asignación...

</p>

</div>

<div class="card">

<p>

<strong>

Destino

</strong>

<div class="map-card">

    <div class="navigation-card">

        <div class="navigation-title">

            Ubicación del conductor

        </div>

        <div class="navigation-info">

            <div>

                <span class="label">

                    Distancia

                </span>

                <strong id="distanceText">

                    --

                </strong>

            </div>

            <div>

                <span class="label">

                    Tiempo

                </span>

                <strong id="timeText">

                    --

                </strong>

            </div>

        </div>

    </div>

    <div id="map"></div>

</div>

  
</p>

<p id="destinoViaje">

...

</p>

</div>

</div>

<script
type="module"
src="../js/viaje-activo-pasajero.js">

</script>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script
src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js">
</script>

<script
type="module"
src="../js/viaje-activo-pasajero.js">
</script>

  
</body>

</html>
