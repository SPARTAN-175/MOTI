<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registro Pasajero | MOTI</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Estilos -->
    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/auth.css">

</head>

<body>

    <div class="container">

        <span class="material-symbols-outlined logo-icon">
            person
        </span>

        <h1 class="logo-text">
            Pasajero
        </h1>

        <p class="slogan">
            Crea tu cuenta para solicitar viajes
        </p>

        <form class="login-form">

            <!-- Nombre -->
            <div class="input-group">

                <label>
                    Nombre completo
                </label>

                <input
                    type="text"
                    placeholder="Ingresa tu nombre">

            </div>

            <!-- Teléfono -->
            <div class="input-group">

                <label>
                    Teléfono
                </label>

                <input
                    type="tel"
                    placeholder="9611234567">

            </div>

            <!-- Contraseña -->
            <div class="input-group">

                <label>
                    Contraseña
                </label>

                <input
                    type="password"
                    placeholder="********">

            </div>

            <!-- Confirmar -->
            <div class="input-group">

                <label>
                    Confirmar contraseña
                </label>

                <input
                    type="password"
                    placeholder="********">

            </div>

            <!-- Términos -->
            <div class="checkbox-group">

                <input
                    type="checkbox"
                    id="terminos">

                <label for="terminos">
                    Acepto los términos y condiciones
                </label>

            </div>

            <!-- Botón -->
            <a href="dashboard-pasajero.html"
               class="btn-primary">
                Crear cuenta
            </a>

        </form>

    </div>

</body>

</html>
