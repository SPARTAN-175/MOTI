<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MOTI | Inicio</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Estilos -->
    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/pasajero.css">

</head>

<body>

    <div class="dashboard">

        <!-- Encabezado -->
        <header class="header">

            <h2>
                Hola Carlos 👋
            </h2>

            <p>
                Bienvenido a MOTI
            </p>

        </header>

        <!-- Ubicación -->
        <section class="location-card">

            <span class="material-symbols-outlined">
                location_on
            </span>

            <div>

                <strong>
                    Mi ubicación
                </strong>

                <p>
                    Detectando ubicación...
                </p>

            </div>

        </section>

        <!-- Mapa -->
        <section class="map-container">

            <span class="material-symbols-outlined map-icon">
                map
            </span>

            <p>
                Aquí aparecerá el mapa
            </p>

        </section>

        <!-- Destino -->
        <section class="destination">

            <label>
                Destino
            </label>

            <input
                type="text"
                placeholder="Escribe o busca un destino">

        </section>

        <!-- Botón -->
        <a href="#"
           class="btn-primary">

            Solicitar viaje

        </a>

    </div>

    <!-- Menú inferior -->
    <nav class="bottom-nav">

        <a href="#">
            <span class="material-symbols-outlined">
                home
            </span>
            Inicio
        </a>

        <a href="#">
            <span class="material-symbols-outlined">
                event
            </span>
            Programar
        </a>

        <a href="#">
            <span class="material-symbols-outlined">
                person
            </span>
            Perfil
        </a>

    </nav>

</body>

</html>
