<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MOTI | Inicio</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Estilos -->
    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/pasajero.css">

</head>

<body>

    <div class="dashboard">

        <!-- Encabezado -->

        <header class="header">

            <h2>
                Hola Carlos 👋
            </h2>

            <p>
                Bienvenido a MOTI
            </p>

        </header>

        <!-- Ubicación -->

<section class="location-card">

    <span class="material-symbols-outlined">

        location_on

    </span>

    <div>

        <strong>

            Mi ubicación

        </strong>

        <p id="currentLocation">

            Detectando ubicación...

        </p>

    </div>

</section>

        <!-- Ver ubicación -->

<section class="map-link-card">

    <span class="material-symbols-outlined">

        map

    </span>

    <div>

        <strong>

            Ver ubicación en mapa

        </strong>

        <p>

            Confirma que tu ubicación sea correcta

        </p>

    </div>

</section>
        
        <!-- Tipo de viaje -->

        <section class="trip-selector">

            <button class="trip-option active"
                    id="btnLocal">

                LOCAL

            </button>

            <button class="trip-option"
                    id="btnEspecial">

                ESPECIAL

            </button>

        </section>

        <!-- Destino Especial -->

        <section id="specialFields"
                 class="destination"
                 style="display:none;">

            <label>

                Destino

            </label>

            <select>

                <option>

                    Seleccionar destino

                </option>

                <option>

                    Plan de Ayala

                </option>

                <option>

                    Nuevo Xochimilco

                </option>

                <option>

                    Tapalapa

                </option>

            </select>

        </section>

        <!-- Observaciones -->

        <section class="destination">

            <label>

                Observaciones

            </label>

            <textarea
                placeholder="Ejemplo: Estoy frente a urgencias">
            </textarea>

        </section>

        <!-- Tarifa -->

        <section class="fare-card">

            <span>

                Tarifa estimada

            </span>

            <strong id="fareAmount">

                $10

            </strong>

        </section>

        <!-- Botón -->

        <a href="#"
           class="btn-primary">

            Solicitar Mototaxi

        </a>

    </div>

    <!-- Menú inferior -->

    <nav class="bottom-nav">

        <a href="#">

            <span class="material-symbols-outlined">

                home

            </span>

            Inicio

        </a>

        <a href="#">

            <span class="material-symbols-outlined">

                receipt_long

            </span>

            Mis Viajes

        </a>

        <a href="perfil-pasajero.html">

            <span class="material-symbols-outlined">

                person

            </span>

            Perfil

        </a>

    </nav>

    <script type="module"
        src="../js/dashboard-pasajero.js"></script>



    <script type="module"
        src="../js/firebase-test.js">
    </script>

<script type="module"
        src="../js/auth-guard.js">
</script>
    
</body>

</html>
