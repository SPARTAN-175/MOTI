<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MOTI | Rutas Especiales</title>

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/rutas-tarifas.css">

</head>

<body>

    <div class="container">

        <!-- Encabezado -->

        <h2>Rutas Especiales</h2>

        <p class="subtitle">
            Configura las rutas especiales que deseas realizar.
        </p>

        <!-- Botón agregar -->

        <button class="add-route-btn">

            + Agregar Ruta

        </button>

        <!-- Tarjeta 1 -->

        <div class="route-card">

            <h3>Plan de Ayala</h3>

            <p>Tarifa: $30</p>

            <div class="card-actions">

                <button class="edit-btn">

                    Editar

                </button>

                <button class="delete-btn">

                    Eliminar

                </button>

            </div>

        </div>

        <!-- Tarjeta 2 -->

        <div class="route-card">

            <h3>Nuevo Xochimilco</h3>

            <p>Tarifa: $25</p>

            <div class="card-actions">

                <button class="edit-btn">

                    Editar

                </button>

                <button class="delete-btn">

                    Eliminar

                </button>

            </div>

        </div>

        <!-- Tarjeta 3 -->

        <div class="route-card">

            <h3>Francisco Villa</h3>

            <p>Tarifa: $35</p>

            <div class="card-actions">

                <button class="edit-btn">

                    Editar

                </button>

                <button class="delete-btn">

                    Eliminar

                </button>

            </div>

        </div>

    </div>

</body>

</html>
