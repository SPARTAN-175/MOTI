<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registro Pasajero | MOTI</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Estilos -->
    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/auth.css">

</head>

<body>

    <div class="container">

        <span class="material-symbols-outlined logo-icon">
         two_wheeler
         </span>

        <h1 class="logo-text">
         Conductor
        </h1>

        <p class="slogan">
         Regístrate para ofrecer tus servicios
        </p>

        <form class="login-form">

            <!-- Nombre -->
            <div class="input-group">

                <label>
                    Nombre completo
                </label>

               <input
    type="text"
    id="nombre"
    placeholder="Ingresa tu nombre">

            </div>

            <!-- Teléfono -->
            <div class="input-group">

                <label>
                    Teléfono
                </label>

                <input
    type="tel"
    id="telefono"
    placeholder="9611234567">

            </div>

            <div class="input-group">

    <label>
        Municipio
    </label>

    <input
        type="text"
        id="municipio"
        placeholder="Ostuacán">

</div>

            <div class="input-group">

    <label>
        Localidad
    </label>

    <input
        type="text"
        id="localidad"
        placeholder="Centro">

</div>

           <!-- Placa de unidad -->
            <div class="input-group">

                <label>
                    Placa de unidad
                </label>

                <input
    type="text"
    id="placa"
    placeholder="Ingresa la placa de tu unidad">

            </div>

            <!-- Contraseña -->
            <div class="input-group">

                <label>
                    Contraseña
                </label>

                <input
    type="password"
    id="password"
    placeholder="********">

            </div>

            <!-- Confirmar -->
            <div class="input-group">

                <label>
                    Confirmar contraseña
                </label>

                <input
    type="password"
    id="confirmPassword"
    placeholder="********">

            </div>

            <div class="checkbox-group">

    <input
        type="checkbox"
        id="mayorEdad">

    <label for="mayorEdad">
        Declaro ser mayor de edad
    </label>

</div>

<div class="checkbox-group">

    <input
        type="checkbox"
        id="informacion">

    <label for="informacion">
        Declaro que la información proporcionada es correcta
    </label>

</div>

<div class="checkbox-group">

    <input
        type="checkbox"
        id="terminos">

    <label for="terminos">
        Acepto los términos y condiciones
    </label>

</div>

            <!-- Botón -->
           <button
    type="button"
    id="btnRegistroConductor"
    class="btn-primary">

    Solicitar registro

</button>

        </form>

    </div>




    <script type="module"
        src="../js/registro-conductor.js">
</script>
</body>

</html>
