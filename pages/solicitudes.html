<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Solicitudes | MOTI</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/solicitudes.css">

</head>

<body>

    <div class="container">

    <h2>Nueva Solicitud</h2>

    <div class="request-card local">

        <div class="trip-badge">

            LOCAL

        </div>

        <div class="request-section">

            <span class="label">
                Pasajero
            </span>

            <strong>
                Carlos Hernández
            </strong>

        </div>

        <div class="request-section">

            <span class="label">
                Origen
            </span>

            <strong>
                Hospital Básico Comunitario
            </strong>

        </div>

        <div class="request-section">

            <span class="label">
                Destino
            </span>

            <strong>
                Mercado Municipal
            </strong>

        </div>

        <div class="request-section">

            <span class="label">
                Distancia
            </span>

            <strong>
                1.2 km
            </strong>

        </div>

        <div class="request-section">

            <span class="label">
                Tarifa
            </span>

            <strong class="fare">
                $10
            </strong>

        </div>

        <div class="actions">

            <button class="accept-btn">

                Aceptar

            </button>

            <button class="reject-btn">

                Rechazar

            </button>

        </div>

    </div>

</div>
    
<script type="module"
        src="../js/auth-guard.js">
</script>
    
</body>
</html>
