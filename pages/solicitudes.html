<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Solicitudes | MOTI</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/solicitudes.css">

</head>

<body>

    <div class="container">

        <h2>Solicitudes</h2>

        <div class="request-card local">

            <div class="trip-type">
                LOCAL
            </div>

            <div class="trip-info">

                <p>
                    <strong>Origen:</strong><br>
                    Hospital Básico
                </p>

                <p>
                    <strong>Destino:</strong><br>
                    Mercado Municipal
                </p>

                <p>
                    <strong>Distancia:</strong><br>
                    1.2 km
                </p>

                <p>
                    <strong>Tarifa:</strong><br>
                    $10
                </p>

            </div>

            <div class="actions">

                <button class="accept-btn local-btn">
                    Aceptar
                </button>

                <button class="reject-btn">
                    Rechazar
                </button>

            </div>

        </div>

    </div>

</body>
</html>
