<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MOTI | Agregar Ruta</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/agregar-ruta.css">

</head>

<body>

    <div class="container">

        <h2>Agregar Ruta</h2>

        <p class="subtitle">
            Selecciona un destino y define la tarifa.
        </p>

        <form>

            <label>
                Destino
            </label>

            <select>

                <option value="">
                    Seleccionar destino
                </option>

                <option>
                    Local
                </option>

                <option>
                    Plan de Ayala
                </option>

                <option>
                    Nuevo Xochimilco
                </option>

                <option>
                    Francisco Villa
                </option>

            </select>

            <label>
                Tarifa
            </label>

            <input type="number"
                   placeholder="$ 0.00">

            <div class="buttons">

                <button type="submit"
                        class="save-btn">

                    Guardar

                </button>

                <a href="rutas-tarifas.html"
                   class="cancel-btn">

                    Cancelar

                </a>

            </div>

        </form>

    </div>

</body>

</html>
