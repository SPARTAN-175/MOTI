<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MOTI | Conductor</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Estilos -->
    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/conductor.css">

</head>

<body>

    <div class="dashboard">

        <!-- Encabezado -->
        <header class="header">

            <h2>
                Hola Juan 👋
            </h2>

            <p>
                Bienvenido a MOTI
            </p>

        </header>

        <!-- Estado -->
        <section class="status-card">

            <div class="status-info">

                <span class="status-dot"></span>

                <strong>
                    Disponible
                </strong>

            </div>

            <button class="status-btn">

                Cambiar estado

            </button>

        </section>

        <!-- Solicitud -->
        <section class="request-card">

            <h3>
                Solicitud disponible
            </h3>

            <div class="request-info">

                <p>
                    📍 Viejo Xochimilco
                </p>

                <p>
                    🎯 Centro
                </p>

                <p>
                    📏 1.2 km
                </p>

            </div>

            <div class="request-actions">

                <button class="accept-btn">

                    Aceptar

                </button>

                <button class="reject-btn">

                    Rechazar

                </button>

            </div>

        </section>

    </div>

    <!-- Menú inferior -->
    <nav class="bottom-nav">

        <a href="#">
            <span class="material-symbols-outlined">
                home
            </span>
            Inicio
        </a>

        <a href="#">
            <span class="material-symbols-outlined">
                route
            </span>
            Rutas
        </a>

        <a href="#">
            <span class="material-symbols-outlined">
                person
            </span>
            Perfil
        </a>

    </nav>

</body>

</html>
