<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MOTI | Conductor</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Estilos -->
    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/conductor.css">

</head>

<body>

    <div class="dashboard">

    <!-- Saludo -->
    <header class="header">

        <h2>Hola Juan 👋</h2>

        <p>Bienvenido a MOTI</p>

    </header>

    <!-- Estado -->
    <section class="status-section">

        <p class="status-title">
            Estado Actual
        </p>

        <button class="status-button">

            🟢 DISPONIBLE

        </button>

        <p class="status-description">
            Estás recibiendo solicitudes
        </p>

    </section>

    <!-- Estadísticas -->
    <section class="stats-grid">

        <div class="stat-card large">

            <span>Viajes Hoy</span>

            <h3>15</h3>

        </div>

        <div class="stat-card large">

            <span>Ganancias Hoy</span>

            <h3>$450</h3>

        </div>

    </section>

    <!-- Accesos rápidos -->
    <section class="menu-grid">

        <div class="menu-card">

            <span class="badge">3</span>

            <span class="material-symbols-outlined">
                notifications
            </span>

            <p>Solicitudes</p>

        </div>

        <div class="menu-card">

            <span class="material-symbols-outlined">
                receipt_long
            </span>

            <p>Mis Viajes</p>

        </div>

        <div class="menu-card">

            <span class="material-symbols-outlined">
                route
            </span>

            <p>Rutas y Tarifas</p>

        </div>

        <div class="menu-card">

            <span class="material-symbols-outlined">
                person
            </span>

            <p>Perfil</p>

        </div>

    </section>

</div>

</body>

</html>
