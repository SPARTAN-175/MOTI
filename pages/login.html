<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | MOTI</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Material Symbols -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <!-- Estilos -->
    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/auth.css">

</head>

<body>

    <div class="container">

        <!-- Logo -->
        <span class="material-symbols-outlined logo-icon">
            two_wheeler
        </span>

        <!-- Nombre -->
        <h1 class="logo-text">
            MOTI
        </h1>

        <!-- Subtítulo -->
        <p class="slogan">
            Bienvenido de nuevo
        </p>

        <!-- Formulario -->
        <form class="login-form">

            <!-- Teléfono -->
            <div class="input-group">

                <label>
                    Teléfono
                </label>

                <input
                    type="tel"
                    placeholder="9611234567">

            </div>

            <!-- Contraseña -->
            <div class="input-group">

                <label>
                    Contraseña
                </label>

                <input
                    type="password"
                    placeholder="********">

            </div>

            <!-- Botón -->
            <a href="pasajero.html"
               class="btn-primary">
                Iniciar sesión
            </a>

        </form>

        <!-- Separador -->
        <div class="separator">
            <span>o</span>
        </div>

        <!-- Registro -->
        <a href="registro.html"
           class="btn-secondary">
            Crear cuenta
        </a>

    </div>

</body>

</html>
