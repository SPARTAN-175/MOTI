<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MOTI | Viaje Activo</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/viaje-activo.css">

</head>

<body>

    <div class="container">

    <h2>Detalles del Viaje</h2>

    <div class="trip-card local">

        <div class="trip-badge">

            LOCAL

        </div>

        <div class="trip-section">

            <span class="label">
                Pasajero
            </span>

            <strong>
                Carlos Hernández
            </strong>

        </div>

        <div class="trip-section">

            <span class="label">
                Teléfono
            </span>

            <strong>
                9611234567
            </strong>

        </div>

        <div class="trip-section">

            <span class="label">
                Origen
            </span>

            <strong>
                Hospital Básico Comunitario
            </strong>

        </div>

        <div class="trip-section">

            <span class="label">
                Destino
            </span>

            <strong>
                Mercado Municipal
            </strong>

        </div>

        <div class="trip-section">

            <span class="label">
                Observaciones
            </span>

            <strong>
                Estoy frente a urgencias
            </strong>

        </div>

        <div class="trip-section">

            <span class="label">
                Tarifa
            </span>

            <strong class="fare">
                $10
            </strong>

        </div>

        <div class="actions">

            <a href="tel:9611234567"
               class="call-btn">

                Llamar

            </a>

            <button class="finish-btn">

                Finalizar Viaje

            </button>

        </div>

    </div>

</div>
    
<script type="module"
        src="../js/auth-guard.js">
</script>
    
</body>

</html>
