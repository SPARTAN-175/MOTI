<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MOTI | Viaje Activo</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/variables.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/viaje-activo.css">

</head>

<body>

    <div class="container">

        <h2>Viaje Activo</h2>

        <div class="trip-card local">

            <div class="trip-type">
                LOCAL
            </div>

            <div class="trip-info">

                <div class="info-item">

                    <span class="label">
                        Pasajero
                    </span>

                    <strong>
                        Carlos Hernández
                    </strong>

                </div>

                <div class="info-item">

                    <span class="label">
                        Origen
                    </span>

                    <strong>
                        Hospital Básico
                    </strong>

                </div>

                <div class="info-item">

                    <span class="label">
                        Destino
                    </span>

                    <strong>
                        Mercado Municipal
                    </strong>

                </div>

                <div class="info-item">

                    <span class="label">
                        Tarifa
                    </span>

                    <strong>
                        $10
                    </strong>

                </div>

            </div>

            <div class="actions">

                <button class="navigate-btn">

                    Navegar

                </button>

                <button class="finish-btn">

                    Finalizar Viaje

                </button>

            </div>

        </div>

    </div>

</body>

</html>
